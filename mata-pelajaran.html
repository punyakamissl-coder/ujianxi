<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Mata Pelajaran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800">
    <nav class="bg-white/90 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4 md:px-8 flex justify-between items-center">
            <h2 class="text-xl md:text-2xl font-black text-slate-800 tracking-tight">Portal <span class="text-indigo-600">Ujian</span></h2>
            <a href="index.html" class="flex items-center gap-2 text-slate-400 hover:text-indigo-600 font-bold transition-colors group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                <span class="hidden sm:inline group-hover:underline">Beranda</span>
            </a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div id="subjectGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <!-- JavaScript will render 22 subjects here -->
        </div>
    </main>

    <!-- Modal Login -->
    <div id="loginModal" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-white border border-slate-100 rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl text-center">
            <div class="w-20 h-20 bg-indigo-50 text-indigo-500 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" /></svg>
            </div>
            <h3 id="modalTitle" class="text-3xl font-black text-slate-800 mb-2 tracking-tight">Login Ujian</h3>
            <p class="text-slate-500 mb-8 text-sm leading-relaxed">Masukkan detail Anda untuk memulai ujian mata pelajaran ini.</p>
            <form id="formLogin" class="space-y-5">
                <input type="text" id="nama" placeholder="Nama Lengkap" required class="w-full px-6 py-4 rounded-2xl bg-slate-50 border border-slate-100 text-slate-800 placeholder:text-slate-400 focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none transition-all font-semibold">
                <input type="text" id="nomor" placeholder="Nomor Ujian" required class="w-full px-6 py-4 rounded-2xl bg-slate-50 border border-slate-100 text-slate-800 placeholder:text-slate-400 focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none transition-all font-semibold">
                <input type="text" id="token" placeholder="Kode Token" required class="w-full px-6 py-4 rounded-2xl bg-slate-50 border border-slate-100 text-slate-800 placeholder:text-slate-400 focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none transition-all font-black tracking-[0.2em]">
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 text-slate-400 font-bold hover:bg-slate-50 rounded-2xl transition-all">Batal</button>
                    <button type="submit" class="flex-1 py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all transform active:scale-95">Masuk Ujian</button>
                </div>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="main.js"></script>
</body>
</html>
